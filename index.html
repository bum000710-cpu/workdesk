<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WorkDesk">
<meta name="theme-color" content="#1a1a18">
<title>WorkDesk</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231a1a18'/><text y='68' x='50' text-anchor='middle' font-size='55' fill='white'>W</text></svg>">

<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --bg: #f7f6f2;
  --white: #ffffff;
  --surface: #f0efe9;
  --border: #e2e0d6;
  --text: #1a1a18;
  --text2: #5a5a50;
  --muted: #9a9a8e;
  --blue: #2563eb;
  --blue-bg: #eff3ff;
  --green: #16a34a;
  --green-bg: #f0fdf4;
  --red: #dc2626;
  --red-bg: #fef2f2;
  --orange: #ea580c;
  --orange-bg: #fff7ed;
  --yellow: #d97706;
  --yellow-bg: #fffbeb;
  --nav-h: 64px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  font-family: -apple-system, BlinkMacSystemFont, 'Malgun Gothic', '맑은 고딕', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  color: var(--text);
}

/* ── NAV BAR (bottom) ── */
.nav-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: calc(var(--nav-h) + var(--safe-bottom));
  padding-bottom: var(--safe-bottom);
  background: var(--white);
  border-top: 1px solid var(--border);
  display: flex;
  z-index: 100;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.06);
}

.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  cursor: pointer;
  border: none;
  background: transparent;
  color: var(--muted);
  font-family: inherit;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.2px;
  transition: color 0.15s;
  -webkit-tap-highlight-color: transparent;
  padding-bottom: 4px;
}

.nav-item.active { color: var(--text); }

.nav-icon {
  font-size: 22px;
  line-height: 1;
  transition: transform 0.2s;
}

.nav-item.active .nav-icon { transform: scale(1.1); }

.nav-dot {
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--text);
  opacity: 0;
  transition: opacity 0.15s;
}
.nav-item.active .nav-dot { opacity: 1; }

/* ── PAGES ── */
.pages {
  position: fixed;
  top: 0; left: 0; right: 0;
  bottom: calc(var(--nav-h) + var(--safe-bottom));
  overflow: hidden;
}

.page {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  opacity: 0;
  pointer-events: none;
  transform: translateY(8px);
  transition: opacity 0.2s ease, transform 0.2s ease;
}

.page.active {
  opacity: 1;
  pointer-events: auto;
  transform: translateY(0);
}

/* ── PAGE HEADER ── */
.page-header {
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 10;
  padding: 52px 20px 16px;
  border-bottom: 1px solid var(--border);
}

.page-title {
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -0.5px;
}

.page-sub {
  font-size: 13px;
  color: var(--muted);
  margin-top: 2px;
}

.page-content { padding: 20px 20px 32px; }

/* ── INSTALL BANNER ── */
.install-banner {
  background: var(--text);
  color: #fff;
  border-radius: 14px;
  padding: 16px 18px;
  margin-bottom: 20px;
  display: flex;
  align-items: flex-start;
  gap: 12px;
}

.install-banner .icon { font-size: 28px; flex-shrink: 0; }

.install-banner h3 { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
.install-banner p  { font-size: 12px; opacity: 0.7; line-height: 1.5; }

.install-steps {
  margin-top: 10px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.install-step {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  opacity: 0.85;
}

.step-num {
  width: 20px; height: 20px;
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
}

/* ── CALENDAR ── */
.cal-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.cal-nav-btn {
  width: 38px; height: 38px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--white);
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text);
  transition: background 0.12s;
}
.cal-nav-btn:active { background: var(--surface); }

.cal-month {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.3px;
}

.today-btn {
  font-size: 12px;
  font-weight: 600;
  padding: 7px 14px;
  border-radius: 8px;
  border: none;
  background: var(--text);
  color: #fff;
  cursor: pointer;
}

.cal-grid {
  background: var(--white);
  border-radius: 16px;
  overflow: hidden;
  border: 1px solid var(--border);
  margin-bottom: 20px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.04);
}

.cal-weekdays {
  display: grid;
  grid-template-columns: repeat(7,1fr);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}

.cal-wd {
  text-align: center;
  padding: 9px 0;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  color: var(--muted);
}
.cal-wd:first-child { color: var(--red); }
.cal-wd:last-child  { color: var(--blue); }

.cal-days { display: grid; grid-template-columns: repeat(7,1fr); }

.cal-day {
  min-height: 62px;
  padding: 6px 4px 4px;
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.1s;
  position: relative;
  overflow: hidden;
}
.cal-day:nth-child(7n) { border-right: none; }
.cal-day:active { background: var(--surface); }

.cal-day.other-month { background: #fafaf8; }
.cal-day.other-month .dn { color: #d8d7cf; }

.cal-day.is-today { background: var(--blue-bg); }
.cal-day.is-today .dn {
  background: var(--blue);
  color: #fff;
  border-radius: 50%;
  width: 22px; height: 22px;
  display: flex; align-items: center; justify-content: center;
}

.cal-day.is-sel {
  background: var(--yellow-bg);
  outline: 2px solid var(--yellow);
  outline-offset: -2px;
}

.cal-day.is-holiday .dn { color: var(--red); }
.cal-day.is-sunday .dn  { color: var(--red); }
.cal-day.is-saturday .dn { color: var(--blue); }

.dn {
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
  width: 22px; height: 22px;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 2px;
}

.hol-label {
  font-size: 8.5px;
  font-weight: 700;
  text-align: center;
  line-height: 1.2;
  margin-bottom: 1px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  padding: 0 2px;
}
.hol-label.hol  { color: var(--red); }
.hol-label.sub  { color: var(--orange); }

.day-dots {
  display: flex;
  flex-wrap: wrap;
  gap: 2px;
  justify-content: center;
  padding: 0 2px;
}

.day-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
}
.dot-task  { background: var(--blue); }
.dot-event { background: var(--green); }

/* ── DAY DETAIL PANEL ── */
.day-panel {
  background: var(--white);
  border-radius: 16px;
  border: 1px solid var(--border);
  overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,0.05);
}

.day-panel-head {
  padding: 16px 18px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.day-panel-title { font-size: 15px; font-weight: 700; }
.day-panel-hol   { font-size: 11px; color: var(--red); font-weight: 600; margin-top: 2px; }

.add-row {
  display: flex;
  gap: 8px;
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}

.type-toggle {
  display: flex;
  background: var(--border);
  border-radius: 8px;
  padding: 2px;
  flex-shrink: 0;
}

.type-btn {
  padding: 6px 10px;
  border-radius: 6px;
  border: none;
  background: transparent;
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  color: var(--muted);
  transition: all 0.12s;
  white-space: nowrap;
}
.type-btn.active {
  background: var(--white);
  color: var(--text);
  box-shadow: 0 1px 4px rgba(0,0,0,0.1);
}

.ev-input {
  flex: 1;
  border: 1px solid var(--border);
  border-radius: 9px;
  padding: 9px 13px;
  font-family: inherit;
  font-size: 14px;
  background: var(--white);
  color: var(--text);
  outline: none;
  min-width: 0;
}
.ev-input:focus { border-color: var(--blue); }
.ev-input::placeholder { color: var(--muted); }

.ev-add-btn {
  width: 38px; height: 38px;
  border-radius: 9px;
  border: none;
  background: var(--text);
  color: #fff;
  font-size: 20px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

.event-list-inner { padding: 10px 14px 14px; display: flex; flex-direction: column; gap: 6px; }

.ev-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 11px 13px;
  border-radius: 10px;
  border: 1px solid var(--border);
  font-size: 14px;
  background: var(--white);
  animation: popIn 0.18s ease;
}

@keyframes popIn {
  from { opacity:0; transform:scale(0.97); }
  to   { opacity:1; transform:scale(1); }
}

.ev-item.t-task  { border-left: 3px solid var(--blue); }
.ev-item.t-event { border-left: 3px solid var(--green); }
.ev-item.is-done { opacity: 0.5; }
.ev-item.is-done .ev-text { text-decoration: line-through; color: var(--muted); }

.ev-check {
  width: 20px; height: 20px;
  border-radius: 5px;
  border: 1.5px solid var(--border);
  background: transparent;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  color: transparent;
  flex-shrink: 0;
  transition: all 0.12s;
}
.ev-item.is-done .ev-check { background: var(--green); border-color: var(--green); color: #fff; }

.ev-badge {
  font-size: 9px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 4px;
  text-transform: uppercase;
  flex-shrink: 0;
}
.badge-task  { background: var(--blue-bg); color: var(--blue); }
.badge-event { background: var(--green-bg); color: var(--green); }

.ev-text { flex: 1; font-size: 13px; line-height: 1.4; min-width: 0; word-break: break-word; }

.ev-del {
  background: transparent;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 15px;
  padding: 3px 5px;
  border-radius: 5px;
  flex-shrink: 0;
}
.ev-del:active { background: var(--red-bg); color: var(--red); }

.empty-day {
  padding: 32px 0;
  text-align: center;
  color: var(--muted);
  font-size: 13px;
}
.empty-day .e-icon { font-size: 28px; display: block; margin-bottom: 8px; }

/* ── MEMO PAGE ── */
.memo-compose {
  background: var(--white);
  border-radius: 16px;
  border: 1px solid var(--border);
  padding: 16px;
  margin-bottom: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}

.memo-title-in {
  width: 100%;
  background: transparent;
  border: none;
  font-family: inherit;
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  outline: none;
  margin-bottom: 8px;
}
.memo-title-in::placeholder { color: var(--muted); font-weight: 400; }

.memo-divider { height: 1px; background: var(--border); margin-bottom: 10px; }

.memo-body-in {
  width: 100%;
  background: transparent;
  border: none;
  font-family: inherit;
  font-size: 14px;
  color: var(--text2);
  outline: none;
  resize: none;
  min-height: 80px;
  line-height: 1.6;
}
.memo-body-in::placeholder { color: var(--muted); }

.memo-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
  flex-wrap: wrap;
  gap: 8px;
}

.tag-row { display: flex; gap: 5px; flex-wrap: wrap; }

.tag-btn {
  padding: 5px 10px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  font-family: inherit;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  color: var(--muted);
  transition: all 0.12s;
}
.tag-btn.sel-work     { background: var(--blue-bg);   border-color: var(--blue);   color: var(--blue); }
.tag-btn.sel-personal { background: #f5f3ff;           border-color: #7c3aed;       color: #7c3aed; }
.tag-btn.sel-idea     { background: var(--yellow-bg);  border-color: var(--yellow); color: var(--yellow); }
.tag-btn.sel-ref      { background: var(--green-bg);   border-color: var(--green);  color: var(--green); }

.save-btn {
  background: var(--text);
  border: none;
  border-radius: 9px;
  padding: 9px 20px;
  color: #fff;
  font-family: inherit;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
}

.memo-list { display: flex; flex-direction: column; gap: 10px; }

.memo-card {
  background: var(--white);
  border-radius: 14px;
  border: 1px solid var(--border);
  padding: 16px;
  border-left: 4px solid var(--border);
  animation: popIn 0.18s ease;
}

.memo-card.tc-work     { border-left-color: var(--blue); }
.memo-card.tc-personal { border-left-color: #7c3aed; }
.memo-card.tc-idea     { border-left-color: var(--yellow); }
.memo-card.tc-ref      { border-left-color: var(--green); }

.mc-head { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 6px; }
.mc-title { font-size: 14px; font-weight: 700; }
.mc-tag {
  font-size: 9px;
  font-weight: 700;
  padding: 3px 7px;
  border-radius: 4px;
  text-transform: uppercase;
  flex-shrink: 0;
}
.mt-work     { background: var(--blue-bg);   color: var(--blue); }
.mt-personal { background: #f5f3ff;           color: #7c3aed; }
.mt-idea     { background: var(--yellow-bg);  color: var(--yellow); }
.mt-ref      { background: var(--green-bg);   color: var(--green); }
.mt-none     { background: var(--surface);    color: var(--muted); }

.mc-body { font-size: 13px; color: var(--text2); line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
.mc-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; padding-top: 8px; border-top: 1px solid var(--border); }
.mc-date { font-size: 11px; color: var(--muted); }
.mc-del { background: transparent; border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; color: var(--muted); font-family: inherit; font-size: 11px; font-weight: 600; cursor: pointer; }
.mc-del:active { background: var(--red-bg); border-color: var(--red); color: var(--red); }

/* ── HOME PAGE ── */
.home-greeting { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 4px; }
.home-date { font-size: 13px; color: var(--muted); margin-bottom: 24px; }

.home-card {
  background: var(--white);
  border-radius: 16px;
  border: 1px solid var(--border);
  padding: 18px;
  margin-bottom: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.03);
}

.hc-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 12px; }

.today-tasks { display: flex; flex-direction: column; gap: 6px; }
.tt-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 10px;
  background: var(--surface);
  font-size: 13px;
}
.tt-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.tt-text { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.progress-wrap { margin-top: 12px; }
.progress-bg { height: 6px; background: var(--border); border-radius: 10px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--blue), var(--green)); border-radius: 10px; transition: width 0.4s ease; }
.progress-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-top: 6px; font-weight: 600; }

.hol-notice {
  background: var(--red-bg);
  border: 1px solid #fca5a5;
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.hol-notice .icon { font-size: 20px; }
.hol-notice-text { font-size: 13px; font-weight: 600; color: var(--red); }
.hol-notice-sub  { font-size: 11px; color: #ef4444; opacity: 0.8; margin-top: 2px; }

.sub-notice {
  background: var(--orange-bg);
  border: 1px solid #fdba74;
}
.sub-notice .hol-notice-text { color: var(--orange); }
.sub-notice .hol-notice-sub  { color: var(--orange); }

.empty-home { padding: 20px 0; text-align: center; color: var(--muted); font-size: 13px; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<!-- PAGES -->
<div class="pages">

  <!-- HOME -->
  <div class="page active" id="page-home">
    <div class="page-header">
      <div class="page-title">WorkDesk</div>
      <div class="page-sub" id="home-date-sub"></div>
    </div>
    <div class="page-content">
      <div id="hol-notice-area"></div>

      <!-- Today's tasks -->
      <div class="home-card">
        <div class="hc-label">📋 오늘의 할 일</div>
        <div id="home-tasks" class="today-tasks"></div>
        <div class="progress-wrap">
          <div class="progress-bg"><div class="progress-fill" id="home-prog" style="width:0%"></div></div>
          <div class="progress-label">
            <span id="home-prog-l">완료율</span>
            <span id="home-prog-r">0 / 0</span>
          </div>
        </div>
      </div>

      <!-- Upcoming -->
      <div class="home-card">
        <div class="hc-label">📅 다가오는 일정 (7일)</div>
        <div id="home-upcoming"></div>
      </div>

      <!-- Install guide -->
      <div class="install-banner" id="install-banner">
        <div class="icon">📲</div>
        <div>
          <h3>✅ 인터넷 없이도 완전 동작!</h3>
          <p>외부 폰트 제거 완료 — 오프라인에서도 100% 작동합니다. 데이터도 기기에 저장돼요.</p>
          <div class="install-steps">
            <div class="install-step"><div class="step-num">1</div><span>이 파일을 <strong>크롬(Chrome)</strong>으로 열기</span></div>
            <div class="install-step"><div class="step-num">2</div><span>주소창 오른쪽 끝 <strong>⋮ 점 세 개</strong> 탭</span></div>
            <div class="install-step"><div class="step-num">3</div><span>메뉴에서 <strong>"홈 화면에 추가"</strong> 선택</span></div>
            <div class="install-step"><div class="step-num">4</div><span>이름 확인 후 <strong>"추가"</strong> → 바탕화면 아이콘 완성!</span></div>
            <div class="install-step"><div class="step-num">💡</div><span>이후엔 아이콘 탭만 하면 크롬 없이 바로 열려요</span></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- CALENDAR -->
  <div class="page" id="page-cal">
    <div class="page-header">
      <div class="cal-nav">
        <button class="cal-nav-btn" onclick="changeMonth(-1)">‹</button>
        <div class="cal-month" id="cal-month-lbl"></div>
        <div style="display:flex;gap:6px">
          <button class="cal-nav-btn" onclick="changeMonth(1)">›</button>
          <button class="today-btn" onclick="goToday()">오늘</button>
        </div>
      </div>
    </div>
    <div class="page-content" style="padding-top:16px">
      <div class="cal-grid">
        <div class="cal-weekdays">
          <div class="cal-wd">일</div><div class="cal-wd">월</div><div class="cal-wd">화</div>
          <div class="cal-wd">수</div><div class="cal-wd">목</div><div class="cal-wd">금</div>
          <div class="cal-wd">토</div>
        </div>
        <div class="cal-days" id="cal-days"></div>
      </div>
      <div id="day-panel"></div>
    </div>
  </div>

  <!-- MEMO -->
  <div class="page" id="page-memo">
    <div class="page-header">
      <div class="page-title">메모장</div>
      <div class="page-sub" id="memo-count-sub">메모 0개</div>
    </div>
    <div class="page-content">
      <div class="memo-compose">
        <input class="memo-title-in" id="memo-title" placeholder="제목 (선택)">
        <div class="memo-divider"></div>
        <textarea class="memo-body-in" id="memo-body" placeholder="내용 입력..."></textarea>
        <div class="memo-toolbar">
          <div class="tag-row" id="tag-btns">
            <button class="tag-btn" data-t="none"     onclick="selTag('none',this)">없음</button>
            <button class="tag-btn" data-t="work"     onclick="selTag('work',this)">업무</button>
            <button class="tag-btn" data-t="personal" onclick="selTag('personal',this)">개인</button>
            <button class="tag-btn" data-t="idea"     onclick="selTag('idea',this)">아이디어</button>
            <button class="tag-btn" data-t="ref"      onclick="selTag('ref',this)">참고</button>
          </div>
          <button class="save-btn" onclick="addMemo()">저장</button>
        </div>
      </div>
      <div class="memo-list" id="memo-list"></div>
    </div>
  </div>

</div>

<!-- BOTTOM NAV -->
<nav class="nav-bar">
  <button class="nav-item active" onclick="goPage('home',this)">
    <span class="nav-icon">🏠</span>
    <span>홈</span>
    <div class="nav-dot"></div>
  </button>
  <button class="nav-item" onclick="goPage('cal',this)">
    <span class="nav-icon">📅</span>
    <span>캘린더</span>
    <div class="nav-dot"></div>
  </button>
  <button class="nav-item" onclick="goPage('memo',this)">
    <span class="nav-icon">📝</span>
    <span>메모</span>
    <div class="nav-dot"></div>
  </button>
</nav>

<script>
// ── STATE ──
let events = JSON.parse(localStorage.getItem('wd3_events') || '{}');
let memos  = JSON.parse(localStorage.getItem('wd3_memos')  || '[]');
let curTag = 'none';
let calY, calM, selDate = null;
let evType = 'task';

const today = new Date();
calY = today.getFullYear();
calM = today.getMonth();

// ── HOLIDAYS ──
const HOL = {};
function H(y,m,d,n,s){ const k=`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`; HOL[k]={n,s:!!s}; }

// 2024
H(2024,1,1,'신정'); H(2024,2,9,'설날 연휴'); H(2024,2,10,'설날'); H(2024,2,11,'설날 연휴');
H(2024,2,12,'설날 대체공휴일',1); H(2024,3,1,'삼일절'); H(2024,4,10,'총선');
H(2024,5,5,'어린이날'); H(2024,5,6,'어린이날 대체공휴일',1); H(2024,5,15,'부처님오신날');
H(2024,6,6,'현충일'); H(2024,8,15,'광복절'); H(2024,9,16,'추석 연휴');
H(2024,9,17,'추석'); H(2024,9,18,'추석 연휴'); H(2024,10,3,'개천절');
H(2024,10,9,'한글날'); H(2024,12,25,'크리스마스');
// 2025
H(2025,1,1,'신정'); H(2025,1,28,'설날 연휴'); H(2025,1,29,'설날'); H(2025,1,30,'설날 연휴');
H(2025,3,1,'삼일절'); H(2025,3,3,'삼일절 대체공휴일',1); H(2025,5,5,'어린이날');
H(2025,5,6,'부처님오신날'); H(2025,6,6,'현충일'); H(2025,8,15,'광복절');
H(2025,10,3,'개천절'); H(2025,10,5,'추석 연휴'); H(2025,10,6,'추석');
H(2025,10,7,'추석 연휴'); H(2025,10,8,'추석 대체공휴일',1); H(2025,10,9,'한글날');
H(2025,12,25,'크리스마스');
// 2026
H(2026,1,1,'신정'); H(2026,2,16,'설날 연휴'); H(2026,2,17,'설날'); H(2026,2,18,'설날 연휴');
H(2026,3,1,'삼일절'); H(2026,3,2,'삼일절 대체공휴일',1); H(2026,5,5,'어린이날');
H(2026,5,24,'부처님오신날'); H(2026,6,6,'현충일'); H(2026,8,15,'광복절');
H(2026,9,24,'추석 연휴'); H(2026,9,25,'추석'); H(2026,9,26,'추석 연휴');
H(2026,10,3,'개천절'); H(2026,10,9,'한글날'); H(2026,12,25,'크리스마스');

// ── NAV ──
function goPage(id, el) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  el.classList.add('active');
  if (id==='cal') renderCal();
  if (id==='home') renderHome();
}

// ── DATE UTILS ──
function fmt(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function fmtKey(y,m,d){ return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }

// ── SAVE ──
function save(){
  localStorage.setItem('wd3_events', JSON.stringify(events));
  localStorage.setItem('wd3_memos',  JSON.stringify(memos));
}

// ── CALENDAR ──
function changeMonth(d){ calM+=d; if(calM>11){calM=0;calY++;} if(calM<0){calM=11;calY--;} renderCal(); }
function goToday(){ calY=today.getFullYear(); calM=today.getMonth(); renderCal(); }

function renderCal(){
  const MN=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('cal-month-lbl').textContent=`${calY}년 ${MN[calM]}`;
  const firstDow = new Date(calY,calM,1).getDay();
  const dim = new Date(calY,calM+1,0).getDate();
  const prevDim = new Date(calY,calM,0).getDate();
  const todayStr = fmt(today);
  let html='';

  // prev
  for(let i=0;i<firstDow;i++){
    html+=`<div class="cal-day other-month"><div class="dn">${prevDim-firstDow+1+i}</div></div>`;
  }

  for(let d=1;d<=dim;d++){
    const ds = fmtKey(calY,calM,d);
    const dow = new Date(calY,calM,d).getDay();
    const hol = HOL[ds];
    const evs = events[ds]||[];
    const tasks = evs.filter(e=>e.t==='task');
    const evts  = evs.filter(e=>e.t==='event');
    const isSel   = ds===selDate;
    const isToday = ds===todayStr;
    const isSun   = dow===0;
    const isSat   = dow===6;

    let cls='cal-day';
    if(isSun) cls+=' is-sunday';
    if(isSat) cls+=' is-saturday';
    if(isToday) cls+=' is-today';
    if(isSel)   cls+=' is-sel';
    if(hol)     cls+=' is-holiday';

    const dnStyle = isToday ? ' style="background:var(--blue);color:#fff;border-radius:50%"' : '';
    let inner = `<div class="dn">${d}</div>`;
    if(hol) inner+=`<div class="hol-label ${hol.s?'sub':'hol'}">${hol.n.replace(' 연휴','').replace(' 대체공휴일','★')}</div>`;

    if(tasks.length||evts.length){
      inner+=`<div class="day-dots">`;
      tasks.slice(0,3).forEach(()=>inner+=`<div class="day-dot dot-task"></div>`);
      evts.slice(0,3).forEach(()=>inner+=`<div class="day-dot dot-event"></div>`);
      inner+=`</div>`;
    }

    html+=`<div class="${cls}" onclick="selectDay('${ds}')">${inner}</div>`;
  }

  // next
  const total=firstDow+dim;
  const rem = total%7===0?0:7-(total%7);
  for(let i=1;i<=rem;i++) html+=`<div class="cal-day other-month"><div class="dn">${i}</div></div>`;

  document.getElementById('cal-days').innerHTML=html;
  renderDayPanel();
}

function selectDay(ds){
  selDate=ds;
  renderCal();
  renderDayPanel();
  // scroll to panel
  setTimeout(()=>{
    const p=document.getElementById('day-panel');
    if(p) p.scrollIntoView({behavior:'smooth',block:'start'});
  },50);
}

function setEvType(t, el){
  evType=t;
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
}

function addEvent(){
  if(!selDate) return;
  const inp=document.getElementById('ev-input');
  const text=inp.value.trim();
  if(!text) return;
  if(!events[selDate]) events[selDate]=[];
  events[selDate].push({id:Date.now(), t:evType, text, done:false});
  inp.value='';
  save(); renderDayPanel(); renderCal(); renderHome();
}

function toggleEv(ds,id){
  events[ds]=(events[ds]||[]).map(e=>e.id===id?{...e,done:!e.done}:e);
  save(); renderDayPanel(); renderHome();
}

function delEv(ds,id){
  events[ds]=(events[ds]||[]).filter(e=>e.id!==id);
  save(); renderDayPanel(); renderCal(); renderHome();
}

function renderDayPanel(){
  const panel=document.getElementById('day-panel');
  if(!selDate){panel.innerHTML='';return;}
  const d=new Date(selDate+'T00:00:00');
  const DN=['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];
  const hol=HOL[selDate];
  const evs=events[selDate]||[];

  let listHtml='';
  if(evs.length===0){
    listHtml=`<div class="empty-day"><span class="e-icon">✨</span>등록된 항목이 없어요<br>위에서 추가해보세요!</div>`;
  } else {
    listHtml = evs.map(e=>`
      <div class="ev-item t-${e.t} ${e.done?'is-done':''}">
        ${e.t==='task'?`<button class="ev-check" onclick="toggleEv('${selDate}',${e.id})">✓</button>`:'<span style="font-size:16px;flex-shrink:0">📌</span>'}
        <span class="ev-badge badge-${e.t}">${e.t==='task'?'Task':'일정'}</span>
        <span class="ev-text">${esc(e.text)}</span>
        <button class="ev-del" onclick="delEv('${selDate}',${e.id})">✕</button>
      </div>`).join('');
  }

  panel.innerHTML=`
    <div class="day-panel">
      <div class="day-panel-head">
        <div>
          <div class="day-panel-title">${d.getMonth()+1}월 ${d.getDate()}일 ${DN[d.getDay()]}</div>
          ${hol?`<div class="day-panel-hol">${hol.s?'🟠':'🔴'} ${hol.n}</div>`:''}
        </div>
      </div>
      <div class="add-row">
        <div class="type-toggle">
          <button class="type-btn ${evType==='task'?'active':''}" onclick="setEvType('task',this)">Task</button>
          <button class="type-btn ${evType==='event'?'active':''}" onclick="setEvType('event',this)">일정</button>
        </div>
        <input class="ev-input" id="ev-input" placeholder="내용 입력..." onkeydown="if(event.key==='Enter')addEvent()">
        <button class="ev-add-btn" onclick="addEvent()">+</button>
      </div>
      <div class="event-list-inner">${listHtml}</div>
    </div>`;
}

// ── MEMO ──
function selTag(t,el){
  curTag=t;
  document.querySelectorAll('.tag-btn').forEach(b=>b.className='tag-btn');
  el.classList.add('sel-'+t);
}

function addMemo(){
  const title=document.getElementById('memo-title').value.trim();
  const body=document.getElementById('memo-body').value.trim();
  if(!title&&!body) return;
  const d=new Date();
  memos.unshift({id:Date.now(),title,body,tag:curTag,
    date:`${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`
  });
  document.getElementById('memo-title').value='';
  document.getElementById('memo-body').value='';
  curTag='none';
  document.querySelectorAll('.tag-btn').forEach(b=>b.className='tag-btn');
  save(); renderMemos();
}

function delMemo(id){ memos=memos.filter(m=>m.id!==id); save(); renderMemos(); }

const TL={none:'일반',work:'업무',personal:'개인',idea:'아이디어',ref:'참고'};

function renderMemos(){
  const list=document.getElementById('memo-list');
  document.getElementById('memo-count-sub').textContent=`메모 ${memos.length}개`;
  if(!memos.length){list.innerHTML=`<div style="text-align:center;padding:40px 0;color:var(--muted);font-size:13px">✏️<br>메모가 없어요</div>`;return;}
  list.innerHTML=memos.map(m=>`
    <div class="memo-card tc-${m.tag}">
      <div class="mc-head">
        <div class="mc-title">${m.title||'<span style="color:var(--muted);font-weight:400">제목 없음</span>'}</div>
        <span class="mc-tag mt-${m.tag}">${TL[m.tag]}</span>
      </div>
      <div class="mc-body">${esc(m.body)}</div>
      <div class="mc-foot">
        <span class="mc-date">${m.date}</span>
        <button class="mc-del" onclick="delMemo(${m.id})">삭제</button>
      </div>
    </div>`).join('');
}

// ── HOME ──
function renderHome(){
  const todayStr=fmt(today);
  const DN=['일','월','화','수','목','금','토'];
  document.getElementById('home-date-sub').textContent=
    `${today.getFullYear()}년 ${today.getMonth()+1}월 ${today.getDate()}일 (${DN[today.getDay()]})`;

  // Holiday notice
  const hol=HOL[todayStr];
  const holArea=document.getElementById('hol-notice-area');
  if(hol){
    holArea.innerHTML=`
      <div class="hol-notice ${hol.s?'sub-notice':''}">
        <span class="icon">${hol.s?'🟠':'🎌'}</span>
        <div>
          <div class="hol-notice-text">${hol.n}</div>
          <div class="hol-notice-sub">${hol.s?'대체공휴일':'오늘은 공휴일입니다'}</div>
        </div>
      </div>`;
  } else {
    holArea.innerHTML='';
  }

  // Today tasks
  const todayEvs=events[todayStr]||[];
  const tasks=todayEvs.filter(e=>e.t==='task');
  const done=tasks.filter(e=>e.done).length;
  const homeTasks=document.getElementById('home-tasks');
  if(!tasks.length){
    homeTasks.innerHTML=`<div class="empty-home">오늘 등록된 할 일이 없어요<br><span style="font-size:11px;opacity:0.6">캘린더에서 추가해보세요!</span></div>`;
  } else {
    homeTasks.innerHTML=tasks.map(t=>`
      <div class="tt-item">
        <div class="tt-dot" style="background:${t.done?'var(--green)':'var(--blue)'}"></div>
        <span class="tt-text" style="${t.done?'text-decoration:line-through;color:var(--muted)':''}">${esc(t.text)}</span>
        ${t.done?'✅':''}
      </div>`).join('');
  }
  const pct=tasks.length?Math.round(done/tasks.length*100):0;
  document.getElementById('home-prog').style.width=pct+'%';
  document.getElementById('home-prog-l').textContent=`완료율 ${pct}%`;
  document.getElementById('home-prog-r').textContent=`${done} / ${tasks.length}`;

  // Upcoming 7 days
  const upcoming=[];
  for(let i=1;i<=7;i++){
    const d=new Date(today); d.setDate(today.getDate()+i);
    const ds=fmt(d);
    const hd=HOL[ds];
    const ev=events[ds]||[];
    if(hd||ev.length){
      upcoming.push({ds,d,hd,ev});
    }
  }
  const upEl=document.getElementById('home-upcoming');
  if(!upcoming.length){
    upEl.innerHTML=`<div class="empty-home">향후 7일 내 일정이 없어요</div>`;
  } else {
    upEl.innerHTML=upcoming.map(u=>`
      <div style="padding:8px 0;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:10px">
        <div style="flex-shrink:0;text-align:center;min-width:36px">
          <div style="font-size:11px;font-weight:700;color:var(--muted)">${['일','월','화','수','목','금','토'][u.d.getDay()]}</div>
          <div style="font-size:18px;font-weight:700;letter-spacing:-0.5px">${u.d.getDate()}</div>
        </div>
        <div style="flex:1;min-width:0">
          ${u.hd?`<div style="font-size:11px;font-weight:700;color:${u.hd.s?'var(--orange)':'var(--red)'};margin-bottom:3px">${u.hd.s?'🟠':'🔴'} ${u.hd.n}</div>`:''}
          ${u.ev.map(e=>`<div style="font-size:12px;color:var(--text2);padding:1px 0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.t==='task'?'📋':'📌'} ${esc(e.text)}</div>`).join('')}
        </div>
      </div>`).join('');
  }
}

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── INIT ──
const todayStr=fmt(today);
renderHome();
renderMemos();
selDate=todayStr;
renderCal();
</script>
</body>
</html>
